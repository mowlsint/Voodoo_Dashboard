name: Voodoo Ingest (hourly)

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Show repo structure
        run: |
          echo "Root:"
          ls -la
          echo "Scripts:"
          ls -la scripts || true
          echo "Config:"
          ls -la config || true

      - name: Verify required files
        run: |
          test -f scripts/ingest.mjs
          test -f config/sources.yml

      - name: Install dependencies
        run: |
          npm install yaml fast-xml-parser --no-audit --no-fund

      - name: Check ingest syntax
        run: |
          node --check scripts/ingest.mjs

      - name: Run ingest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/ingest.mjs
