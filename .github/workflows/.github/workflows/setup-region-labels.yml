name: Setup VOODOO Region Labels

on:
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  setup-labels:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup region labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash scripts/setup_region_labels_v1.sh mowlsint/Voodoo_Dashboard
