name: "Cyber/OT + CI/Port/WSV"
description: "Cyber-/OT-Vorfälle an Bord, Häfen, VTS/WSV; CI (Kabel, Pipelines, Windparks) und Hafeninfrastruktur."
title: "[Cyber/CI] "
labels: ["D:CYBER_OT", "CONF:MED", "SEV:2", "SRC:OFFICIAL"]
body:
  - type: dropdown
    id: domain
    attributes:
      label: "Domäne (prüfen/ggf. ändern)"
      options: ["D:CYBER_OT","D:INFRA_CI","D:NEWS_INTEL"]
    validations:
      required: true

  - type: input
    id: time_start
    attributes:
      label: "Zeit (UTC)"
      placeholder: "2026-03-01T10:20:00Z"
    validations:
      required: true

  - type: dropdown
    id: region
    attributes:
      label: "Region"
      options: ["REG:NORTH_SEA","REG:BALTIC_SEA","REG:MED","REG:ATLANTIC_NE","REG:INLAND_WATERWAYS"]
    validations:
      required: true

  - type: checkboxes
    id: objects
    attributes:
      label: "Objektbezug (OBJ:*) – passende Labels setzen"
      options:
        - label: "OBJ:PORT"
        - label: "OBJ:VTS_WSV"
        - label: "OBJ:WATERWAY"
        - label: "OBJ:CABLE"
        - label: "OBJ:PIPELINE"
        - label: "OBJ:WINDFARM"
        - label: "OBJ:VESSEL"
        - label: "OBJ:OFFSHORE"
        - label: "OBJ:SEA_AREA"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "Beschreibung"
      placeholder: "Was wurde beobachtet? Systeme/OT betroffen? Betriebsstörung? Indikatoren, mögliche Wirkung."
    validations:
      required: true

  - type: dropdown
    id: conf_event
    attributes:
      label: "Fakten-Confidence (CONF:*)"
      options: ["CONF:LOW","CONF:MED","CONF:HIGH"]
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: "Severity (SEV:*)"
      options: ["SEV:1","SEV:2","SEV:3","SEV:4"]
    validations:
      required: true

  - type: checkboxes
    id: phase0
    attributes:
      label: "Phase Zero / Hybrid-Verdacht (optional)"
      options:
        - label: "P0:SUSPECT"
        - label: "P0:LOW"
        - label: "P0:MED"
        - label: "P0:HIGH"
    validations:
      required: false

  - type: textarea
    id: sources
    attributes:
      label: "Quellen"
      placeholder: "- Advisory\n- Behörde\n- CERT\n- Presse\n- Partnerhinweis"
    validations:
      required: false