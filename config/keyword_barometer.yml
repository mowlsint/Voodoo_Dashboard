# VOODOO Keyword Barometer v2
# Ablageort im Repo: config/keyword_barometer.yml
# Zweck:
#   Separater Social/RSS-Sensor für Keyword-Spikes im 3h-Raster.
#   Nicht für manuelle Issue-Texte verwenden.
#   Der Hybrid-Index bleibt getrennt; dieses Barometer liefert nur Keyword-Dichte/Abweichung.
#
# Hinweise:
#   A/B breit einsetzbar.
#   C/D bevorzugt mit Kontextankern oder booleschen Rezepten nutzen.
#   Generische Einzelbegriffe werden gedämpft, damit der Sensor nicht durch allgemeines Rauschen hochläuft.

version: 2
name: "VOODOO Keyword Barometer"
file: "config/keyword_barometer.yml"
owner: "MOwlSINT / Voodoo Dashboard"
created_from_discussion: "2026-05-09"

source_scope:
  include_labels:
    - "SRC:SOCIAL"
    - "SRC:MEDIA"
  include_source_types:
    - "rss"
    - "social_x"
    - "social_bsky"
  exclude:
    manual_issue_text: true
    official_only_for_keyword_sensor: false
  note: "Keyword-Barometer zählt Social + RSS/Media. Manuelle Issues bleiben draußen."

time_window:
  bucket_hours: 3
  trend_hours: 72
  snapshot_hours:
    - 0
    - 12

baseline:
  rolling_days: 90
  level:
    - "source_id"
    - "domain_label"
  mode: "expected_plus_spread"
  spread: "iqr_or_stddev"
  minimum_observations: 30
  cold_start:
    enabled: true
    fallback_mode: "weighted_density"
    note: "Bis 90 Tage Baseline vorhanden sind, nur vorsichtig als Dichte-Barometer interpretieren."

normalization:
  score_mode: "density_vs_baseline"
  cap_curve: "logistic"
  max_score: 100
  creator_bias:
    cap_per_source_per_bucket: 5
    diminishing_returns: true
    weights:
      first_hit: 1.0
      second_hit: 0.6
      third_hit: 0.35
      further_hits: 0.15
  dedupe:
    same_url: true
    same_actor_repost_cap: true
    same_text_similarity: true
    text_similarity_threshold: 0.88
    normalized_title_similarity: true

scoring:
  tier_weights:
    A: 1.0
    B: 0.7
    C: 0.45
    D: 0.25
  context_boost:
    maritime_anchor: 1.25
    north_sea_or_baltic: 1.25
    official_or_specialist_source: 1.15
    infrastructure_anchor: 1.20
    vessel_anchor: 1.15
    rf_or_cyber_anchor: 1.15
  noise_dampening:
    single_generic_term_factor: 0.25
    generic_single_terms:
      - "drone"
      - "drones"
      - "UAV"
      - "UAS"
      - "sabotage"
      - "espionage"
      - "spoofing"
      - "jamming"
      - "EW"
      - "MDA"
      - "overflight"
      - "cyber attack"
      - "electronic warfare"
      - "gray zone"
      - "grey zone"

