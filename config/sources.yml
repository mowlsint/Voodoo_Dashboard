version: 1

endpoints:
  hybrid_api_base: "https://voodoo-hybrid-api.mowlsint.workers.dev"
  social_bridge_base: "https://voodoo-social-bridge.mowlsint.workers.dev"

defaults:
  domain_fallback: "D:NEWS_INTEL"
  severity_fallback: "SEV:1"
  confidence_fallback: "CONF:LOW"
  base_labels:
    - "SRC:OSINT"

# Konvention:
# - type: rss | html | json | social_x | social_bsky
# - labels: werden beim Erzeugen der Issues standardmäßig gesetzt
# - region_hint: nur Vorschlag (du kannst später automatisiert matchen)
# - priority: 1..100 (höher = wichtiger / häufiger prüfen)

sources:
  # --- OFFICIAL / NAVWARN / NAVTEX / SAFETY ---------------------------------
  - id: "ukho_navwarn"
    name: "UKHO / Admiralty MSI – Radio Navigational Warnings"
    type: "html"
    url: "https://msi.admiralty.co.uk/RadioNavigationalWarnings"
    labels: ["RF:NAVWARN", "D:NEWS_INTEL", "SRC:OFFICIAL"]
    region_hint: "REG:ATLANTIC_NE"
    priority: 95

  - id: "ukmto_home"
    name: "UKMTO – Maritime Trade Operations (Home)"
    type: "html"
    url: "https://www.ukmto.org/"
    labels: ["D:NEWS_INTEL", "SRC:OFFICIAL"]
    region_hint: "REG:MED"
    priority: 90

  - id: "nato_shipping_centre"
    name: "NATO Shipping Centre (News/Advisories)"
    type: "html"
    url: "https://www.shipping.nato.int/"
    labels: ["D:NEWS_INTEL", "SRC:OFFICIAL"]
    region_hint: "REG:ATLANTIC_NE"
    priority: 80

  - id: "bsh_warnings"
    name: "BSH – Nautische Warnnachrichten / Navigationswarnungen"
