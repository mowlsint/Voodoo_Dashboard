    url: "at://warontherocks.bsky.social"
    labels: ["D:NEWS_INTEL","SRC:SOCIAL","CONF:LOW"]
    conf_default: "CONF:LOW"
    notes: "WOTR (Bluesky)."

  # --- SOCIAL OSINT (X / TWITTER) ---
  # Ohne bezahlte X-API braucht es bei Weg 1 einen Bridge-Ansatz:
  # - RSSHub (self-host / public instance) ODER Nitter (instabil).
  # Du kannst hier erstmal nur "Handles" pflegen, Parser kümmert sich dann um die Bridge-URL.
  - id: x_navylookout
    kind: x_bridge
    url: "x://NavyLookout"
    labels: ["D:NEWS_INTEL","SRC:SOCIAL","CONF:LOW"]
    conf_default: "CONF:LOW"
    notes: "X handle; needs bridge (RSSHub/Nitter)."

  - id: x_ukmto
    kind: x_bridge
    url: "x://UK_MTO"
    labels: ["D:SECURITY_CRIME","SRC:SOCIAL","CONF:LOW"]
    conf_default: "CONF:LOW"
    notes: "X handle; bridge. (Offiziell, aber über Social transportiert.)"

  - id: x_tankertrackers
    kind: x_bridge
    url: "x://TankerTrackers"
    labels: ["D:NEWS_INTEL","V:SHADOW_FLEET","SRC:SOCIAL","CONF:LOW"]
    conf_default: "CONF:LOW"
    notes: "X handle; bridge."
