version: 1
name: "VOODOO Maritime Key Regions"
description: >
  Analytical key regions and subregions for VOODOO maritime OSINT.
  These regions may also exist as GitHub labels where useful.
  They are not exact event locations. Use them for filtering, clustering,
  reporting and regional sensor logic.

